<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="872" height="344" viewBox="0 0 872 344"><rect width="872" height="344" fill="#F7F9FC"></rect><text x="40" y="32" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">Agentic systems can work with increasing task complexity.</text><g><path d="M 220 72 L 232 72 L 232 112 L 244 112" fill="none" stroke="#7B8AB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><polygon points="236,108 236,116 244,112" fill="#7B8AB8"></polygon></g><g><path d="M 424 112 L 436 112 L 436 152 L 448 152" fill="none" stroke="#7B8AB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><polygon points="440,148 440,156 448,152" fill="#7B8AB8"></polygon></g><g><path d="M 628 152 L 640 152 L 640 192 L 652 192" fill="none" stroke="#7B8AB8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><polygon points="644,188 644,196 652,192" fill="#7B8AB8"></polygon></g><g transform="translate(40, 50)"><rect x="0" y="0" width="180" height="44" rx="6" ry="6" fill="#3F51B5"></rect><text x="90" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Individual augmentation</text><rect x="0" y="48" width="180" height="60" rx="6" ry="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"></rect><text x="12" y="72" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="11"><tspan x="12" dy="0">Agents help automate and improve individual tasks.</tspan></text><text x="12" y="88" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic">(High learning curve, continued adoption)</text></g><g transform="translate(244, 90)"><rect x="0" y="0" width="180" height="44" rx="6" ry="6" fill="#3F51B5"></rect><text x="90" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Task &amp; workflow automation</text><rect x="0" y="48" width="180" height="60" rx="6" ry="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"></rect><text x="12" y="72" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="11"><tspan x="12" dy="0">Automation of existing low-complexity workflows.</tspan></text><text x="12" y="88" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic">(Execution capacity to automate existing tasks at volume and high quality)</text></g><g transform="translate(448, 130)"><rect x="0" y="0" width="180" height="44" rx="6" ry="6" fill="#3F51B5"></rect><text x="90" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Functional agentic workflows</text><rect x="0" y="48" width="180" height="60" rx="6" ry="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"></rect><text x="12" y="72" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="11"><tspan x="12" dy="0">Agentic teams working on redesigned workflows.</tspan></text><text x="12" y="88" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic">(Capacity to reimagine processes, engineering agents at scale)</text></g><g transform="translate(652, 170)"><rect x="0" y="0" width="180" height="44" rx="6" ry="6" fill="#3F51B5"></rect><text x="90" y="27" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">Cross-functional agentic systems</text><rect x="0" y="48" width="180" height="60" rx="6" ry="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.5"></rect><text x="12" y="72" fill="#1F2937" font-family="Arial, Helvetica, sans-serif" font-size="11"><tspan x="12" dy="0">Agent-driven systems work on complex workflows across functions, with high-level decision capabilities.</tspan></text><text x="12" y="88" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="10" font-style="italic">(Organisational and operating model redesign)</text></g></svg>